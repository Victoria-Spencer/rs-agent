server:
  port: 8086

spring:
  application:
    name: rail-agent-service
  profiles:
    active: dev  # ????????
  cloud:
    # nacos??????
    nacos:
      discovery:
        server-addr: ${spring.nacos.host}:${spring.nacos.port}
        namespace: 1
        group: DEFAULT_GROUP
        graceful-shutdown: false
  datasource:
    url: jdbc:mysql://${spring.db.host}/rs-order
    username: ${spring.db.username}
    password: ${spring.db.password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      # ========== ???????????cluster??? ==========
      host: 192.168.43.143  # Redis???IP
      port: 6379             # Redis?????6379?
      #      password: ""           # Redis?????????/??????
      database: 1            # ??Redis???????????
      timeout: PT5S          # ??/???????3.5.5??ISO-8601???
      client-name: redis-single-client  # ?????
      lettuce:
        pool:
          max-active: 16     # ?????
          max-idle: 8        # ??????
          min-idle: 4        # ??????
          max-wait: PT2S     # ????????

# ??LLM??
doubao:
  llm:
    api-key: ????API Key
    secret-key: ????Secret Key
    base-url: https://api.doubao.com/v1/chat/completions
    model: doubao-pro-4
    timeout: 30000

